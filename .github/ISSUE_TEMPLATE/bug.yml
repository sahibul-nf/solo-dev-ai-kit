name: Bug report
description: Something broken or a regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Describe what you **see** today — not which commit caused it.
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happens now?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist for AI close-out (use `- [ ]` lines under ## Acceptance criteria in issue body if editing manually)
      placeholder: |
        - [ ] …
        - [ ] …
